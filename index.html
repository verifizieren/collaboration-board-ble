<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Tremola Whiteboard</title>
    <link rel="stylesheet" href="./src/styles.css">
  </head>
  <body>
    <main class="app-shell">
      <header class="topbar">
        <div>
          <h1>Tremola Whiteboard</h1>
          <p>DPI Mini App Dehlen</p>
        </div>
      </header>

      <section class="workspace">
        <section class="board-wrap" aria-label="Gemeinsames Whiteboard">
          <div id="mode-hint" class="mode-hint">Rahmen um Objekte ziehen</div>
          <svg id="board" class="board" viewBox="0 0 1000 680" role="img" aria-label="Objektbasierte Kollaborationsfläche"></svg>
        </section>

        <aside class="status-panel">
          <p id="activity-line" class="activity-line">Noch keine Aktion</p>
        </aside>
      </section>

      <nav class="toolbar" aria-label="Werkzeuge">
        <button id="tool-select" class="tool-button is-active" type="button">Auswahl</button>
        <button id="tool-note" class="tool-button primary" type="button">Notiz</button>
        <button id="tool-draw" class="tool-button" type="button">Zeichnen</button>
        <button id="edit-selected" class="tool-button" type="button" disabled>Bearbeiten</button>
        <button id="delete-selected" class="tool-button danger" type="button" disabled>Löschen</button>
      </nav>

      <section id="note-sheet" class="note-sheet" aria-hidden="true">
        <form id="note-form" class="note-form">
          <label for="note-text">Notiz</label>
          <textarea id="note-text" rows="3" maxlength="180" placeholder="Notiz schreiben..."></textarea>
          <div class="note-actions">
            <button id="cancel-note" class="sheet-button" type="button">Abbrechen</button>
            <button id="save-note" class="sheet-button primary" type="submit">Notiz hinzufügen</button>
          </div>
        </form>
      </section>
    </main>

    <script type="module" src="./src/app.js"></script>
  </body>
</html>
