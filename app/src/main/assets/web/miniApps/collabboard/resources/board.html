<div id='div:collabboard-main' style='display: none;'>
  <section id='cb_room_setup' class='cb_room_setup' style='display: none;'>
    <h2>Boards</h2>
    <div id='cb_saved_boards_shell' class='cb_saved_boards_shell'>
      <div id='cb_saved_boards' class='cb_saved_boards'
           onscroll='cb_update_board_scrollbar()'></div>
      <span id='cb_saved_scrollbar' class='cb_saved_scrollbar' aria-hidden='true'>
        <span id='cb_saved_scroll_thumb' class='cb_saved_scroll_thumb'></span>
      </span>
    </div>
    <p id='cb_saved_empty' class='cb_saved_empty'>No saved boards</p>
    <div id='cb_delete_panel' class='cb_delete_panel' style='display: none;'>
      <strong id='cb_delete_name'></strong>
      <p>Enter the board code to delete it from this phone.</p>
      <label for='cb_delete_code'>6-digit code</label>
      <input id='cb_delete_code' class='cb_room_input cb_code_input' type='text'
             inputmode='numeric' pattern='[0-9]*' maxlength='6' autocomplete='one-time-code'
             placeholder='123456' oninput='this.value=cb_clean_pairing_code(this.value)'>
      <div class='cb_delete_actions'>
        <button class='cb_secondary' type='button' onclick='cb_cancel_delete_board()'>Cancel</button>
        <button id='cb_delete_board_btn' class='cb_danger' type='button'
                onclick='cb_confirm_delete_board()'>Delete</button>
      </div>
      <p id='cb_delete_error' class='cb_delete_error' aria-live='polite'></p>
    </div>
    <label for='cb_username'>Your name</label>
    <input id='cb_username' class='cb_room_input' type='text' maxlength='24'
           autocomplete='nickname' placeholder='Name'>
    <div class='cb_setup_tabs' role='tablist' aria-label='Board action'>
      <button id='cb_setup_create_tab' class='cb_setup_tab cb_active' type='button'
              role='tab' aria-selected='true' onclick='cb_set_setup_mode("create")'>Create</button>
      <button id='cb_setup_join_tab' class='cb_setup_tab' type='button'
              role='tab' aria-selected='false' onclick='cb_set_setup_mode("join")'>Join</button>
    </div>
    <div id='cb_create_panel' class='cb_setup_panel' role='tabpanel'>
      <label for='cb_board_name'>Board name</label>
      <input id='cb_board_name' class='cb_room_input' type='text' maxlength='40'
             placeholder='Project board'>
      <button class='cb_primary' type='button' onclick='cb_create_board()'>Create board</button>
    </div>
    <div id='cb_join_panel' class='cb_setup_panel' role='tabpanel' style='display: none;'>
      <div class='cb_label_help'>
        <label for='cb_join_code'>6-digit code</label>
        <button class='cb_help_button' type='button' aria-label='Code help'
                onclick='cb_show_code_help()'>?</button>
      </div>
      <input id='cb_join_code' class='cb_room_input cb_code_input' type='text'
             inputmode='numeric' pattern='[0-9]*' maxlength='6' autocomplete='one-time-code'
             placeholder='123456' oninput='this.value=cb_clean_pairing_code(this.value)'>
      <button class='cb_primary' type='button' onclick='cb_join_board()'>Join board</button>
    </div>
    <p id='cb_setup_error' class='cb_setup_error' aria-live='polite'></p>
  </section>

  <div id='cb_workspace' class='cb_workspace' style='display: none;'>
    <div id='cb_room_bar'>
      <div class='cb_room_identity'>
        <strong id='cb_room_label'></strong>
        <span id='cb_member_count'>1/4</span>
        <span id='cb_room_code'></span>
      </div>
      <button id='cb_invite_btn' class='cb_room_action' type='button'
              onclick='cb_copy_invite()'>Invite</button>
      <button id='cb_view_btn' class='cb_room_action' type='button'
              onclick='cb_enter_view()'>View</button>
      <button id='cb_dark_btn' class='cb_room_action' type='button' aria-pressed='false'
              onclick='cb_toggle_dark()'>Dark</button>
      <button class='cb_room_action' type='button' onclick='cb_close_board()'>Boards</button>
      <input id='cb_invite_copy' class='cb_hidden_copy' aria-hidden='true' tabindex='-1'>
    </div>
    <div id='cb_toolbar'>
      <button id='cb_tool_pen' class='cb_tool' type='button'
              aria-pressed='false' onclick='cb_toggle_tool("pen")'>Draw</button>
      <button id='cb_tool_text' class='cb_tool' type='button'
              aria-pressed='false' onclick='cb_toggle_tool("text")'>Text</button>
      <button id='cb_tool_select' class='cb_tool' type='button'
              aria-pressed='true' onclick='cb_set_tool("select")'>Edit</button>
      <input id='cb_color' class='cb_color' type='color' value='#2563eb'
             title='Color' aria-label='Color'>
      <button id='cb_delete_btn' class='cb_tool cb_delete' type='button' disabled
              aria-label='Delete selected object' onclick='cb_delete_selected()'>Delete</button>
      <button id='cb_clear_btn' class='cb_tool' type='button'
              aria-label='Clear board' onclick='cb_clear()'>Clear all</button>
      <button id='cb_export_btn' class='cb_tool' type='button' hidden
              aria-label='Export board' onclick='cb_show_export()'>Export</button>
    </div>
    <div id='cb_sync_status' class='cb_sync_status cb_sync_waiting' aria-live='polite'>
      <span id='cb_sync_dot' class='cb_sync_dot' aria-hidden='true'></span>
      <span id='cb_sync_text'>Starting</span>
    </div>
    <div id='cb_selection_info' class='cb_selection_info' hidden></div>
    <input id='cb_text' class='cb_textinput' type='text' maxlength='120'
           enterkeyhint='go' autocomplete='off' autocapitalize='sentences'
           placeholder='Write text' aria-label='Text to add' style='display: none;'
           onkeydown='cb_text_keydown(event)'>
    <div id='cb_canvas_frame' class='cb_canvas_frame'>
      <canvas id='cb_canvas' width='1800' height='2400' tabindex='-1'></canvas>
      <div id='cb_board_loading' class='cb_board_loading' style='display: none;'
           role='status' aria-live='polite'>
        <div class='cb_loading_card'>
          <strong id='cb_loading_title'>Loading board...</strong>
        </div>
      </div>
      <button id='cb_view_exit' class='cb_view_exit' type='button'
              aria-label='Leave board view' onclick='cb_exit_view()'>&larr;</button>
    </div>
  </div>

  <div id='cb_code_help' class='cb_dialog_backdrop' style='display: none;'
       role='dialog' aria-modal='true' aria-labelledby='cb_code_help_title'>
    <div class='cb_dialog'>
      <strong id='cb_code_help_title'>Board code</strong>
      <p>Use a code from an existing board. A random code opens an empty board and cannot sync with the board you want.</p>
      <button class='cb_primary' type='button' onclick='cb_hide_code_help()'>Understand</button>
    </div>
  </div>

  <div id='cb_export_dialog' class='cb_dialog_backdrop' style='display: none;'
       role='dialog' aria-modal='true' aria-labelledby='cb_export_title'>
    <div class='cb_dialog'>
      <strong id='cb_export_title'>Export board</strong>
      <p>Export only the whiteboard canvas.</p>
      <div class='cb_export_choices'>
        <button class='cb_primary' type='button' onclick='cb_export("jpeg")'>JPEG image</button>
        <button class='cb_primary' type='button' onclick='cb_export("pdf")'>PDF document</button>
        <button class='cb_secondary' type='button' onclick='cb_hide_export()'>Cancel</button>
      </div>
    </div>
  </div>
</div>
